service: practical-3-redisearch
frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    REDIS_URL: ${env:REDIS_URL}

plugins:
  - serverless-offline

functions:
  search:
    handler: handler.search
    events:
      - http:
          path: search
          method: get
          cors: true
