service: practical-2-langcache
frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  timeout: 30 # LLM + embedding calls + SDK retries need more than the 6s default
  environment:
    REDIS_URL: ${env:REDIS_URL}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}

plugins:
  - serverless-offline

functions:
  chat:
    handler: handler.chat
    events:
      - http:
          path: chat
          method: post
          cors: true
